# Reasonix configuration.
# Resolution order: flag > ./reasonix.toml > ~/AppData/Roaming/reasonix/config.toml > built-in defaults.
# Secrets come from the environment via api_key_env; never put keys here.

config_version = 3   # schema marker for diagnostics; old versions may ignore it
default_model = "deepseek-flash"
# language      = "zh"   # ui/model language; empty = auto-detect from $LANG / $REASONIX_LANG

[agent]
# system_prompt = """..."""   # omit to use the built-in prompt for this version
# system_prompt_file = "prompts/system.md"   # overrides system_prompt when set
# max_steps         = 0   # executor tool-call rounds; 0 = no limit
# planner_max_steps = 12   # planner read-only tool-call rounds; 0 = no limit
temperature       = 0.0
auto_plan   = "off"   # off|on; off keeps plan mode manual
# reasoning_language = "zh"   # visible reasoning language: auto|zh|en
# auto_plan_classifier = "deepseek-flash"   # optional; only used for borderline tasks
soft_compact_ratio  = 0.5   # notice only; keeps cache-first prefix intact
compact_ratio       = 0.8   # try compacting when prompt reaches this fraction
compact_force_ratio = 0.9   # force compacting at this high-water mark
# keep                = ["errors"]   # compaction keep policy: errors, user_marked
# recent_keep         = 2   # minimum recent messages kept verbatim
cold_resume_prune   = true   # elide stale tool results when reopening a session past the provider cache window
# planner_model = "mimo"   # optional: enable two-model collaboration
# subagent_model = "deepseek-pro"   # optional default for runAs=subagent skills
# subagent_models = { review = "deepseek-pro", security_review = "deepseek-pro" }   # per-skill overrides
# subagent_effort = "high"   # optional default effort for subagents
# subagent_efforts = { review = "max", task = "high" }   # per-tool/skill effort overrides
# output_style = "explanatory"   # explanatory | learning | concise | custom; empty = default

[tools]
enabled = []   # empty = all built-in tools
bash_timeout_seconds = 120   # foreground safety cap; set 0 for no tool-local cap

[tools.background_jobs]
stalled_warning_seconds = 900   # warn once per background job after this many quiet seconds; 0 disables

[lsp]
enabled = true   # language server tools; servers launch lazily when used
# [lsp.servers.go]
# command = "gopls"
# args = []
# extensions = [".go"]

[skills]
# paths = ["~/my-skills", "../shared/skills"]   # extra custom skill roots
# excluded_paths = ["~/.agents/skills"]   # hide convention roots without deleting folders
# max_depth = 3   # nested scan depth; set 1 for legacy root-only discovery
# disabled_skills = ["review"]   # hide noisy or unwanted skills

[permissions]
# Per-call gating. mode = writer fallback when no rule matches: ask|allow|deny.
# Readers always default to allow. Precedence: deny > ask > allow > fallback.
# Rules are "Tool" or "Tool(specifier)"; e.g. Bash(go test:*), Edit(src/**).
mode  = "ask"
# deny = ["Bash(rm -rf*)", "Bash(git push*)"]   # hard-blocked in every mode
allow = ["Bash(mkdir -p .reasonix/autoresearch && ls .reasonix/autoresearch/ 2>/dev/null || echo \"empty\")", "Bash(cd D:/super-turtor && head -12 \"技术设计文档.md\" && echo \"====\" && wc -l \"技术设计文档.md\" && echo \"====\" && grep -c \"check_models\\|rename_document\\|NF-01\\|⑱\" \"技术设计文档.md\")", "Bash(cd D:/super-turtor && head -12 \"项目需求说明书.md\")", "explore", "Edit", "Bash(cd D:/super-turtor && python -c \"\nwith open('技术设计文档.md', 'r', encoding='utf-8') as f:\n    lines = f.readlines()\nfor i in range(15, 50):\n    print(f'{i+1}: {repr(lines[i])}')\")", "Bash(cd D:/super-turtor && python -c \"\nwith open('技术设计文档.md', 'r', encoding='utf-8') as f:\n    content = f.read()\n# Find the architecture diagram section\nidx = content.find('┌─────────────────────────────────────────────────────────────────┐')\nprint('Found at index:', idx)\nprint('Line endings:', repr(content[idx:idx+100]))\")", "Bash(cd D:/super-turtor && PYTHONIOENCODING=utf-8 python << 'ENDSCRIPT'\nwith open('技术设计文档.md', 'r', encoding='utf-8') as f:\n    c = f.read()\n\nchanges = 0\n\n# 1. ParsedDocument model - add course\nold = '    ▼ 返回 {\"text\": str, \"metadata\": {filename, page_count, size_bytes, extension, scanned: bool, doc_type: Literal[\"textbook\",\"past_paper\"]}}'\nnew = '    ▼ 返回 {\"text\": str, \"metadata\": {filename, page_count, size_bytes, extension, scanned: bool, doc_type: Literal[\"textbook\",\"past_paper\"], course: str}}'\nif old in c:\n    c = c.replace(old, new, 1)\n    changes += 1\n    print(\"1. ParsedDocument metadata\")\nelse:\n    print(\"FAIL 1\")\n\n# 2. ingest_document - add course param\nold = '    ingest_document(file_path, doc_type: Literal[\"textbook\", \"past_paper\"] = \"textbook\") → {\"ok\": bool, \"chunk_count\"?: int, \"reason\"?: str}'\nnew = '    ingest_document(file_path, doc_type: Literal[\"textbook\", \"past_paper\"] = \"textbook\", course: str = \"\") → {\"ok\": bool, \"chunk_count\"?: int, \"reason\"?: str}\\n        ① metadata[\"course\"] = course  # 写入课程名（空=未分类），后续检索/规划据此过滤'\nif old in c:\n    c = c.replace(old, new, 1)\n    changes += 1\n    print(\"2. ingest_document course\")\nelse:\n    print(\"FAIL 2\")\n\n# 3. search_raw - add course filter support\nold = \"        宽召回，给规划模块用（不做精排阈值过滤）。支持 filter 参数（如 {\\\"doc_type\\\": \\\"textbook\\\"}），\"\nnew = \"        宽召回，给规划模块用（不做精排阈值过滤）。支持 filter 参数（如 {\\\"doc_type\\\": \\\"textbook\\\", \\\"course\\\": \\\"数据结构\\\"}），\"\nif old in c:\n    c = c.replace(old, new, 1)\n    changes += 1\n    print(\"3. search_raw filter\")\nelse:\n    print(\"FAIL 3\")\n\n# 4. ask - add course filter\nold = '    ask(question) → str\\n        ① 如果 self._sources 为空 → 返回 \"请先上传文档\"\\n        ② merged = _hybrid_search(question)\\n        ③ 如果 merged 为空 → 返回 \"未在上传文档中找到相关内容\"\\n        ④ answer = llm.generate_with_citation(question, merged)\\n        ⑤ 返回 answer'\nnew = '    ask(question, course: str = \"\") → str\\n        ① 如果 self._sources 为空 → 返回 \"请先上传文档\"\\n        ② merged = _hybrid_search(question, filter={\"course\": course} if course else None)\\n        ③ 如果 merged 为空 → 返回 \"未在上传文档中找到相关内容\"\\n        ④ answer = llm.generate_with_citation(question, merged)\\n        ⑤ 返回 answer'\nif old in c:\n    c = c.replace(old, new, 1)\n    changes += 1\n    print(\"4. ask course\")\nelse:\n    print(\"FAIL 4\")\n\n# 5. generate_plan - add course param\nold = '    generate_plan(target_days, textbooks, completed_chapters=None) → str\\n        ① 从 tracker.get_completed_chapters() 获取已完成章节\\n        ② 注入 Prompt 跳过已学内容\\n        ③ LLM 生成调整后的计划\\n        ④ tracker.init_plan() 记录新计划的任务列表'\nnew = '    generate_plan(target_days, textbooks, course: str = \"\", completed_chapters=None) → str\\n        ① 从 tracker.get_completed_chapters(course) 获取已完成章节\\n        ② 注入 Prompt 跳过已学内容\\n        ③ LLM 生成调整后的计划（限定 course 内文档）\\n        ④ tracker.init_plan() 记录新计划的任务列表（含 course 字段）'\nif old in c:\n    c = c.replace(old, new, 1)\n    changes += 1\n    print(\"5. generate_plan course\")\nelse:\n    print(\"FAIL 5\")\n\n# 6. ChromaDB metadata - add course\nold = '- 每个 chunk 元数据：`source`（文件名）、`chunk_index`（文档内序号）、`chunk_global_id`（全局递增）、`doc_type`（textbook/past_paper）'\nnew = '- 每个 chunk 元数据：`source`（文件名）、`chunk_index`（文档内序号）、`chunk_global_id`（全局递增）、`doc_type`（textbook/past_paper）、`course`（所属课程名，空=未分类）'\nif old in c:\n    c = c.replace(old, new, 1)\n    changes += 1\n    print(\"6. ChromaDB metadata\")\nelse:\n    print(\"FAIL 6\")\n\n# 7. SQLite daily_task - add course\nold = 'CREATE TABLE daily_task (\\n    id INTEGER PRIMARY KEY AUTOINCREMENT,\\n    plan_id TEXT NOT NULL,\\n    day_index INTEGER NOT NULL,\\n    task_content TEXT NOT NULL,\\n    chapter_ref TEXT,\\n    completed INTEGER DEFAULT 0,\\n    completed_at TEXT,\\n    updated_at TEXT DEFAULT (datetime(\\'now\\'))\\n);'\nnew = 'CREATE TABLE daily_task (\\n    id INTEGER PRIMARY KEY AUTOINCREMENT,\\n    plan_id TEXT NOT NULL,\\n    course TEXT DEFAULT \\'\\',         -- 所属课程\\n    day_index INTEGER NOT NULL,\\n    task_content TEXT NOT NULL,\\n    chapter_ref TEXT,\\n    completed INTEGER DEFAULT 0,\\n    completed_at TEXT,\\n    updated_at TEXT DEFAULT (datetime(\\'now\\'))\\n);'\nif old in c:\n    c = c.replace(old, new, 1)\n    changes += 1\n    print(\"7. SQLite daily_task course\")\nelse:\n    print(\"FAIL 7\")\n\n# 8. Tracker methods - add course\nold = '    get_completed_chapters(plan_id) -> list[str]\\n        获取已完成的章节列表（用于下一次计划生成的\"已学章节注入\"）。'\nnew = '    get_completed_chapters(plan_id, course: str = \"\") -> list[str]\\n        获取已完成的章节列表（用于下一次计划生成的\"已学章节注入\"）。'\nif old in c:\n    c = c.replace(old, new, 1)\n    changes += 1\n    print(\"8. Tracker get_completed_chapters\")\nelse:\n    print(\"FAIL 8\")\n\n# 9. init_plan - add course\nold = '    init_plan(plan_id, tasks: list[dict]) -> None\\n        创建新复习计划的每日任务记录（批量 INSERT）。'\nnew = '    init_plan(plan_id, tasks: list[dict], course: str = \"\") -> None\\n        创建新复习计划的每日任务记录（批量 INSERT，含 course 字段）。'\nif old in c:\n    c = c.replace(old, new, 1)\n    changes += 1\n    print(\"9. init_plan course\")\nelse:\n    print(\"FAIL 9\")\n\n# 10. get_weak_chapters - add course\nold = '    get_weak_chapters(threshold: float = 0.5) -> list[dict]\\n        根据问答正确率/难度判断薄弱章节。'\nnew = '    get_weak_chapters(threshold: float = 0.5, course: str = \"\") -> list[dict]\\n        根据问答正确率/难度判断薄弱章节（限定 course）。'\nif old in c:\n    c = c.replace(old, new, 1)\n    changes += 1\n    print(\"10. get_weak_chapters course\")\nelse:\n    print(\"FAIL 10\")\n\n# 11. UI - add course selector\nold = '- **UI 层**：PySide6 原生桌面窗口，四区布局（知识库列表 + 问答 Tab + 规划 Tab + 学习进度面板）'\nnew = '- **UI 层**：PySide6 原生桌面窗口，四区布局（知识库列表 + 问答 Tab + 规划 Tab + 学习进度面板）。每页顶部有课程选择器下拉框，当前选定课程作为检索/规划/追踪的上下文范围'\nif old in c:\n    c = c.replace(old, new, 1)\n    changes += 1\n    print(\"11. UI course selector\")\nelse:\n    print(\"FAIL 11\")\n\n# 12. Edge case - add course not found\nold = '| ㉓ | 首次使用无进度 | 查询 `daily_task` 表为空 | `get_completed_chapters()` 返回空列表，规划引擎按原始流程执行，UI 显示「暂无学习记录，开始学习吧！」 | tracker.py + planner.py |'\nnew = '| ㉓ | 首次使用无进度 | 查询 `daily_task` 表为空 | `get_completed_chapters()` 返回空列表，规划引擎按原始流程执行，UI 显示「暂无学习记录，开始学习吧！」 | tracker.py + planner.py |\\n| ㉔ | 跨课程文档上传 | 上传文档时指定 course | 按 course 写入 ChromaDB metadata + SQLite，检索时按 course 过滤，不同课程的 chunk 互不干扰 | orchestrator.py |'\n\nif old in c:\n    c = c.replace(old, new, 1)\n    changes += 1\n    print(\"12. edge case 24\")\nelse:\n    print(\"FAIL 12\")\n\n# 13. Update the 3.4 feedback flow to include course\nold = '├─ tracker.get_completed_chapters() → list[str]\\n  ├─ 注入 Prompt：「用户已掌握：{chapters}，请跳过」\\n  ├─ StudyPlanner.generate_plan(days, chunks, completed_chapters)'\nnew = '├─ tracker.get_completed_chapters(course=current_course) → list[str]\\n  ├─ 注入 Prompt：「用户已掌握：{chapters}，请跳过」\\n  ├─ StudyPlanner.generate_plan(days, chunks, course=current_course, completed_chapters)'\nif old in c:\n    c = c.replace(old, new, 1)\n    changes += 1\n    print(\"13. feedback flow course\")\nelse:\n    print(\"FAIL 13\")\n\nwith open('技术设计文档.md', 'w', encoding='utf-8') as f:\n    f.write(c)\n\nprint(f\"\\n==== {changes}/13 changes applied ====\")\nENDSCRIPT)", "Bash(cd D:/super-turtor && PYTHONIOENCODING=utf-8 python -c \"\nwith open('技术设计文档.md', 'r', encoding='utf-8') as f:\n    lines = f.readlines()\n# Find generate_plan\nfor i, line in enumerate(lines):\n    if 'generate_plan' in line and 'completed_chapters' in line:\n        for j in range(max(0,i-2), min(len(lines), i+6)):\n            print(f'{j+1}:{repr(lines[j])[:150]}')\n        print('---')\n    if 'chunk_global_id' in line:\n        print(f'{i+1}:{repr(lines[i])[:150]}')\n        print('---')\n    if 'get_completed_chapters(course' in line or 'tracker.get_completed_chapters()' in line:\n        print(f'{i+1}:{repr(lines[i])[:150]}')\n\")", "Bash(cd D:/super-turtor && ls -la .impeccable 2>&1; ls -la .claude/skills/impeccable 2>&1)"]
# ask = ["Edit(src/**)"]   # force a prompt even if otherwise allowed

[sandbox]
# Confine tool blast radius. File-writers (write_file/edit_file/multi_edit/move_file)
# may only write under workspace_root (empty = current dir) and allow_write extras.
# bash = "enforce" (default) jails each command in an OS sandbox (macOS now;
# graceful fallback elsewhere); "off" disables it. network allows egress.
# workspace_root = ""            # default: current working directory
# allow_write = ["/tmp"]          # extra dirs writers may also modify
bash    = "enforce"
network = true

[statusline]
# A custom status line: a command whose first stdout line replaces the built-in
# data row. It receives {"model","contextUsed","contextWindow","cwd"} as JSON on stdin.
# command = "my-statusline.sh"

# External MCP servers. type: "stdio" (default, a subprocess) | "http" | "sse".
# ${VAR} / ${VAR:-default} are expanded from the environment in command/args/env/url/headers.
# [[plugins]]
# name    = "example"
# command = "reasonix-plugin-example"
# [[plugins]]                                  # a remote server over Streamable HTTP
# name    = "stripe"
# type    = "http"
# url     = "https://mcp.stripe.com"
# headers = { Authorization = "Bearer ${STRIPE_KEY}" }
